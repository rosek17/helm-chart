apiVersion: v1
kind: Service
metadata:
  name: {{ include "helper.fullname" . }}
  labels:
    {{- include "helper.labels" . | nindent 4 }}
spec:
  # Only the HTTP API port is exposed (ClusterIP) so the auth-gateway can
  # forward authenticated API requests. The gRPC port is loopback-only and
  # is intentionally not published.
  type: ClusterIP
  selector:
    {{- include "helper.selectorLabels" . | nindent 4 }}
  ports:
    - name: api
      port: {{ .Values.ports.api }}
      targetPort: api
      protocol: TCP
