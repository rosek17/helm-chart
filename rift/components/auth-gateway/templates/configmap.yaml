apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "helper.fullname" . }}-config
  labels:
    {{- include "helper.labels" . | nindent 4 }}
data:
  config.yaml: |
    configDB:
      uri: {{ .Values.config.mongoUri | quote }}
    keycloak:
      endpoint: {{ .Values.config.keycloakUrl | quote }}
    resourceAliases:
      orgUnitScope: "workspace"
