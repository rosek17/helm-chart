apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helper.fullname" . }}
  labels:
    {{- include "helper.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "helper.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "helper.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z configdb 27017; do echo waiting for mongodb; sleep 2; done']
        - name: wait-for-keycloak
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z keycloak 8080; do echo waiting for keycloak; sleep 2; done']
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "helper.image" . }}
          imagePullPolicy: {{ include "helper.imagePullPolicy" . }}
          ports:
            - name: external
              containerPort: {{ .Values.ports.external }}
              protocol: TCP
            - name: internal
              containerPort: {{ .Values.ports.internal }}
              protocol: TCP
          env:
            - name: MONGO_CONFIGDB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: configdb
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_CONFIGDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: configdb
                  key: MONGO_INITDB_ROOT_PASSWORD
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: keycloak
                  key: KC_BOOTSTRAP_ADMIN_USERNAME
            - name: KEYCLOAK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak
                  key: KC_BOOTSTRAP_ADMIN_PASSWORD
          volumeMounts:
            - name: config-vol
              mountPath: /opt/config.yaml
              subPath: config.yaml
          livenessProbe:
            tcpSocket:
              port: external
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            tcpSocket:
              port: external
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- include "helper.resources" (dict "resources" .Values.resources "global" .Values.global) | nindent 12 }}
      volumes:
        - name: config-vol
          configMap:
            name: {{ include "helper.fullname" . }}-config
            defaultMode: 0555
