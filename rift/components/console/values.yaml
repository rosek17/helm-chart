image:
  repository: console
  tag: ""

replicas: 1

service:
  type: ClusterIP
  port: 443

tls:
  secretName: "tls-cert"

config:
  keycloakUrl: "/"
  keycloakRealm: "root"
  keycloakClientId: "controller"
  apiBaseUrl: "/"

probes:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
