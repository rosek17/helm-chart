apiVersion: v1
kind: Pod
metadata:
  name: {{ include "keycloak.fullname" . }}-test-connection
  labels:
    {{- include "helper.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: test-pg
      image: {{ printf "%s:%s" .Values.postgresql.image.repository (.Values.postgresql.image.tag | default "16") }}
      command: ['pg_isready', '-h', '{{ include "keycloak.fullname" . }}-pg', '-p', '5432', '-U', {{ .Values.postgresql.username | quote }}]
    - name: test-keycloak
      image: busybox:1.36
      command: ['wget', '--spider', '--timeout=5', 'http://{{ include "keycloak.fullname" . }}:8080']
